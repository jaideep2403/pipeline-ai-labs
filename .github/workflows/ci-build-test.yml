name: Production CI Pipeline - Build and Test

on:
  push:
    paths:
      - '02-ci-build-and-test/**'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: cicd-prod
  APP_PORT: '5000'

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: 02-ci-build-and-test

    steps:
      # Pull the repository into the runner workspace.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Match the app's Python runtime before running any validation.
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies so compile and runtime checks use the real package set.
      - name: Install Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Catch syntax or import issues before building the image.
      - name: Compile Source
        run: python -m compileall app

      # Produce the image that will be run and tested in this job.
      - name: Build Docker Image
        run: docker build --pull -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      # Run the container with production-style hardening flags.
      - name: Run Container
        run: |
          set -euo pipefail
          docker rm -f prod-container >/dev/null 2>&1 || true
          docker run -d \
            --name prod-container \
            --publish "${APP_PORT}:5000" \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      # Keep retrying until the real health endpoint answers successfully.
      - name: Wait for App Health
        run: |
          set -euo pipefail
          for i in {1..10}; do
            if curl -fsS "http://127.0.0.1:${APP_PORT}/healthz" >/dev/null; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app health..."
            sleep 2
          done

          docker logs prod-container
          exit 1

      # Capture logs on failure so readers can see what went wrong.
      - name: Capture Container Logs On Failure
        if: failure()
        run: docker logs prod-container || true

      # Remove the container after the test is done.
      - name: Cleanup container
        if: always()
        run: docker rm -f prod-container >/dev/null 2>&1 || true
